<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anu 💖</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
}

/* 💖 HEARTS */
.heart{
    position:fixed;
    bottom:-20px;
    animation:floatHeart linear forwards;
}
@keyframes floatHeart{
    0%{transform:translateY(0) scale(0.6);opacity:0;}
    20%{opacity:0.8;}
    100%{transform:translateY(-120vh) scale(1.4);opacity:0;}
}

/* ✨ SPARKLES */
.spark{
    position:fixed;
    color:white;
    animation:spark 3s linear forwards;
}
@keyframes spark{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;transform:scale(1.5);}
}

/* 👑 TITLE */
h1{
    margin-top:40px;
    font-size:42px;
    animation:glow 3s infinite alternate,
              floatSlow 8s infinite ease-in-out;
}
@keyframes glow{
    from{text-shadow:0 0 10px #ff4d6d;}
    to{text-shadow:0 0 30px #ff99aa;}
}
@keyframes floatSlow{
    50%{transform:translateY(-10px);}
}

/* 🌸 MAIN PHOTO */
.hero img{
    width:260px;
    border-radius:50%;
    margin-top:20px;
    opacity:0;
    transition:2s;
}
.hero img.show{
    opacity:1;
    animation:breathe 4s infinite;
}
@keyframes breathe{
    50%{box-shadow:0 0 70px rgba(255,105,135,1);}
}

/* 💬 TEXT */
.line{
    opacity:0;
    margin:12px;
    font-size:22px;
    transform:translateY(20px);
    transition:1s;
}
.line.show{
    opacity:1;
    transform:translateY(0);
}

/* 📸 GALLERY */
#gallery{
    margin-top:20px;
}
.photo{
    width:140px;
    border-radius:20px;
    margin:10px;
    opacity:0;
    transform:scale(0.8);
    transition:1.5s;
}
.photo.show{
    opacity:1;
    transform:scale(1);
    animation:floatPhoto 5s infinite ease-in-out,
              glowPhoto 3s infinite alternate;
}
@keyframes floatPhoto{
    50%{transform:translateY(-10px) scale(1);}
}
@keyframes glowPhoto{
    from{box-shadow:0 0 10px pink;}
    to{box-shadow:0 0 30px hotpink;}
}

/* 🎬 PAGE */
.page{
    position:absolute;
    width:100%;
    height:100%;
    transition:2s;
}
.hidden{
    opacity:0;
    transform:scale(1.2);
    pointer-events:none;
}

/* 💖 END PAGE */
.end-page{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* 🎬 FINAL TEXT */
.final-text{
    font-size:32px;
    margin:10px;
    animation:glow 2s infinite alternate,
              floatSlow 6s infinite ease-in-out;
}

/* 💥 HEART BURST */
.burst{
    position:fixed;
    font-size:30px;
    animation:burst 1s forwards;
}
@keyframes burst{
    0%{opacity:1;transform:scale(0);}
    100%{opacity:0;transform:translate(var(--x),var(--y)) scale(2);}
}

/* overlay */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}
button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:pink;
    font-size:16px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page">
<h1>HEY ANU ❤️</h1>

<div class="hero">
<img src="photo1.jpg" id="photo">
</div>

<div id="msg"></div>

<!-- 📸 GALLERY -->
<div id="gallery"></div>

</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden end-page">
<img src="photo1.jpg" style="width:260px;border-radius:50%;animation:breathe 4s infinite;">

<div class="final-text">💖 Happy Birthday My Love 💖</div>
<div class="final-text">✨ You are my forever, my peace, my happiness ✨</div>
<div class="final-text">♾️ I LOVE YOU ANU ♾️</div>
</div>

<audio id="music">
<source src="song.mp3">
</audio>

<div id="overlay">
<h2>💖 Open my princess 💖</h2>
<button onclick="start()">Open My Heart</button>
</div>

<script>
const music=document.getElementById("music");
const msg=document.getElementById("msg");
const overlay=document.getElementById("overlay");

const timeline=[
{t:2,text:"💭 I tried to find perfect words..."},
{t:6,text:"🥺 but nothing feels enough"},
{t:10,text:"🌸 You changed my life"},
{t:14,text:"✨ Everything became beautiful"},
{t:18,text:"👑 ANU YOU ARE MY WORLD"},
{t:22,text:"😊 Your smile heals me"},
{t:26,text:"🫶 Your presence is peace"},
{t:30,text:"💞 I will love you forever"},
{t:34,text:"showPhotos"}
];

let shown=[];

function start(){
music.currentTime=0;
music.play().catch(()=>{});
overlay.style.display="none";
}

/* 📸 SHOW GALLERY */
function showGallery(){
const gallery=document.getElementById("gallery");

const photos=[
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg"
];

photos.forEach((src,i)=>{
setTimeout(()=>{
let img=document.createElement("img");
img.src=src;
img.className="photo";

gallery.appendChild(img);

setTimeout(()=>img.classList.add("show"),100);
},i*800);
});
}

/* 🎬 FLOW */
music.ontimeupdate=()=>{
let t=music.currentTime;

if(t>1) photo.classList.add("show");

timeline.forEach((l,i)=>{
if(t>=l.t && !shown.includes(i)){
shown.push(i);

if(l.text==="showPhotos"){
showGallery();
}
else{
let d=document.createElement("div");
d.className="line";
d.innerText=l.text;

msg.appendChild(d);
setTimeout(()=>d.classList.add("show"),100);
}
}
});

/* 🎬 CLIMAX */
if(t>40){
document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");
heartBurst();
}
};

/* 💖 HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["💖","💕","💓","💞"][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*20)+"px";
h.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
},120);

/* ✨ SPARKLES */
setInterval(()=>{
let s=document.createElement("div");
s.className="spark";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
setTimeout(()=>s.remove(),3000);
},300);

/* 💥 BURST */
function heartBurst(){
for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="burst";
b.innerHTML="💖";

let x=(Math.random()*400-200)+"px";
let y=(Math.random()*400-200)+"px";

b.style.setProperty('--x',x);
b.style.setProperty('--y',y);

b.style.left="50%";
b.style.top="50%";

document.body.appendChild(b);
setTimeout(()=>b.remove(),1000);
}
}
</script>

</body>
</html>
