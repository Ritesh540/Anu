<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anu 💖</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
}

/* 💖 HEART BACKGROUND */
.heart{
    position:fixed;
    bottom:-20px;
    pointer-events:none;
    animation:floatHeart linear forwards;
    opacity:0.7;
}
@keyframes floatHeart{
    0%{transform:translateY(0) scale(0.6);opacity:0;}
    20%{opacity:0.8;}
    100%{transform:translateY(-120vh) scale(1.3);opacity:0;}
}

/* 👑 TITLE */
h1{
    margin-top:40px;
    font-size:42px;
    position:relative;
    animation:glow 3s infinite alternate,
              floatSlow 8s infinite ease-in-out;
}
h1::before{
    content:"👑";
    position:absolute;
    top:-28px;
    left:50%;
    transform:translateX(-50%);
    animation:crownFloat 5s infinite ease-in-out;
}
@keyframes crownFloat{
    50%{transform:translate(-50%,-6px);}
}
@keyframes glow{
    from{text-shadow:0 0 10px #ff4d6d;}
    to{text-shadow:0 0 25px #ff99aa;}
}

/* 🌸 PHOTO */
.hero-photo img{
    width:260px;
    height:260px;
    border-radius:50%;
    margin-top:20px;
    opacity:0;
    transition:2s;
}
.hero-photo img.show{
    opacity:1;
    animation:floatMedium 6s infinite ease-in-out,
              breathe 4s infinite ease-in-out;
}
@keyframes breathe{
    50%{box-shadow:0 0 60px rgba(255,105,135,0.9);}
}

/* 💎 TEXT */
.line{
    opacity:0;
    margin:12px auto;
    width:85%;
    font-size:20px;
    transition:1.5s;
    text-shadow:0 0 10px rgba(255,153,170,0.8);
}
.line.show{opacity:1;}

.line.float1{animation:floatSlow 8s infinite;}
.line.float2{animation:floatMedium 10s infinite;}
.line.float3{animation:floatDeep 12s infinite;}

@keyframes floatSlow{50%{transform:translateY(-6px);}}
@keyframes floatMedium{50%{transform:translateY(-10px);}}
@keyframes floatDeep{50%{transform:translateY(-14px);}}

/* 🎬 BOLLYWOOD CLIMAX */
.ending{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:radial-gradient(circle, rgba(255,153,170,0.15), black 70%);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transform:scale(0.85);
    transition:3s ease;
    z-index:10;
}
.ending.show{
    opacity:1;
    transform:scale(1);
    animation:zoomIn 6s ease forwards;
}

@keyframes zoomIn{
    from{transform:scale(0.85);}
    to{transform:scale(1.05);}
}

/* text lines */
.ending div{
    opacity:0;
    transform:translateY(40px);
    font-size:30px;
    margin:12px 0;
    color:#ffb3c6;
    text-shadow:0 0 20px #ff99aa;
}

.ending.show div:nth-child(1){animation:fadeIn 1.5s forwards 0.5s;}
.ending.show div:nth-child(2){animation:fadeIn 1.5s forwards 1.5s;}
.ending.show div:nth-child(3){animation:fadeIn 1.5s forwards 2.5s;}
.ending.show div:nth-child(4){animation:fadeIn 1.5s forwards 3.5s;}

@keyframes fadeIn{
    to{opacity:1;transform:translateY(0) scale(1.05);}
}

/* 💓 BIG HEART */
.ending::before{
    content:"💖";
    position:absolute;
    font-size:180px;
    opacity:0.08;
    animation:heartPulse 4s infinite;
}
@keyframes heartPulse{
    50%{transform:scale(1.5);opacity:0.2;}
}

/* overlay */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:20;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:pink;
}
</style>
</head>

<body>

<h1>HEY ANU ❤️</h1>

<div class="hero-photo">
<img src="photo1.jpg" id="photo">
</div>

<div id="msg"></div>

<div class="ending" id="end">
<div>💖💖💖</div>
<div>Happy dear wife ❣️</div>
<div>✨ Wishing a magical birthday to the woman who fills my life with love, light, and joy ✨</div>
<div>❤️‍🩹🫀♾️</div>
</div>

<audio id="music">
<source src="song.mp3">
</audio>

<div id="overlay">
💖 Open my princess 💖
<button onclick="start()">Open My Heart</button>
</div>

<script>
const music=document.getElementById("music");
const msg=document.getElementById("msg");

/* 🎵 BEAT TIMELINE */
const timeline=[
{t:2,text:"💭 I tried to find perfect words 💖"},
{t:6,text:"🥺 but nothing feels enough..."},
{t:10,text:"🌸 You changed my life"},
{t:14,text:"✨ Everything feels beautiful"},
{t:18,text:"👑 ANU YOU ARE MY WORLD 💖"},
{t:22,text:"😊 Your smile heals me"},
{t:26,text:"🫶 Your presence is peace"},
{t:30,text:"💞 I cherish you forever"}
];

let shown=[];

function start(){
music.play();
overlay.style.display="none";
}

/* 🎬 TIMELINE */
music.ontimeupdate=()=>{
let t=music.currentTime;

if(t>1) photo.classList.add("show");

timeline.forEach((l,i)=>{
if(t>=l.t && !shown.includes(i)){
shown.push(i);

let d=document.createElement("div");
d.className="line float"+(i%3+1);
d.innerText=l.text;

msg.appendChild(d);
setTimeout(()=>d.classList.add("show"),100);
}
});

/* 💥 CLIMAX */
if(t>35){
document.getElementById("end").classList.add("show");

/* 💥 HEART EXPLOSION */
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left="50%";
h.style.top="50%";
let x=(Math.random()-0.5)*600;
let y=(Math.random()-0.5)*600;

h.animate([
{transform:"translate(-50%,-50%) scale(0)",opacity:1},
{transform:`translate(${x}px,${y}px) scale(1.5)`,opacity:0}
],{duration:2000});

document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
}
}
};

/* 💖 BACKGROUND HEARTS (START IMMEDIATELY) */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["💖","💕","💓","💞"][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*20)+"px";
h.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
},120);
</script>

</body>
</html>
