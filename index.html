<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anu 💖</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
}

/* 💖 HEART BACKGROUND */
.heart {
    position:fixed;
    bottom:-20px;
    pointer-events:none;
    animation: floatHeart linear forwards;
    opacity:0.7;
}

@keyframes floatHeart {
    0% { transform: translateY(0) scale(0.6); opacity:0; }
    20% { opacity:0.8; }
    100% { transform: translateY(-120vh) scale(1.3); opacity:0; }
}

/* 👑 TITLE */
h1 {
    margin-top:40px;
    font-size:42px;
    position:relative;
    z-index:2;
    animation: glow 3s ease-in-out infinite alternate,
               floatSlow 8s ease-in-out infinite;
}

h1::before {
    content:"👑";
    position:absolute;
    top:-30px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    animation: crownFloat 5s ease-in-out infinite;
}

@keyframes crownFloat {
    0%,100% { transform: translate(-50%,0); }
    50% { transform: translate(-50%,-6px); }
}

@keyframes glow {
    0% { text-shadow:0 0 10px #ff4d6d; }
    100% { text-shadow:0 0 30px #ff99aa; }
}

/* 🌸 PHOTO */
.hero-photo {
    margin-top:20px;
    position:relative;
    z-index:2;
}

.hero-photo::before {
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    background:url('photo1.jpg') center/cover no-repeat;
    filter:blur(30px) brightness(0.5);
    border-radius:50%;
    z-index:-1;
}

.hero-photo img {
    width:260px;
    height:260px;
    border-radius:50%;
    object-fit:cover;
    opacity:0;
    transform:scale(0.8);
    transition:2s ease;
}

.hero-photo img.show {
    opacity:1;
    transform:scale(1);
    animation: floatMedium 6s ease-in-out infinite,
               breathe 4s ease-in-out infinite;
}

/* 💓 breathing */
@keyframes breathe {
    0% {box-shadow:0 0 20px rgba(255,105,135,0.4);}
    50% {box-shadow:0 0 60px rgba(255,105,135,0.9);}
    100% {box-shadow:0 0 20px rgba(255,105,135,0.4);}
}

/* 💎 TEXT */
.line {
    opacity:0;
    margin:12px auto;
    width:85%;
    font-size:20px;
    transform:translateY(20px);
    transition:1.5s ease;
    text-shadow:0 0 10px rgba(255,153,170,0.7);
}

.line.show {
    opacity:1;
    transform:translateY(0);
}

.line.float1 { animation: floatSlow 8s infinite ease-in-out; }
.line.float2 { animation: floatMedium 10s infinite ease-in-out; }
.line.float3 { animation: floatDeep 12s infinite ease-in-out; }

@keyframes floatSlow {
    50% { transform: translateY(-6px); }
}
@keyframes floatMedium {
    50% { transform: translateY(-10px); }
}
@keyframes floatDeep {
    50% { transform: translateY(-14px); }
}

/* 💥 HEART EXPLOSION */
.burst {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:30px;
    animation: burstAnim 1s ease forwards;
}

@keyframes burstAnim {
    0% { transform:translate(-50%,-50%) scale(0); }
    100% { transform:translate(-50%,-50%) scale(3); opacity:0; }
}

/* 💖 ENDING */
.ending {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:#ff99aa;
    font-size:28px;
    opacity:0;
    transition:3s;
}
.ending.show {opacity:1;}

/* overlay */
#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:pink;
}
</style>
</head>

<body>

<h1>HEY ANU ❤️</h1>

<div class="hero-photo">
    <img src="photo1.jpg" id="mainPhoto">
</div>

<div id="message"></div>

<div class="ending" id="ending">
    <div>💖💖💖</div>
    <div>Happy dear wife ❣️</div>
    <div>✨ You are my forever, my always ✨</div>
    <div>❤️‍🩹🫀♾️</div>
</div>

<audio id="bgMusic">
<source src="song.mp3">
</audio>

<div id="overlay">
💖 Open my princess 💖
<button onclick="start()">Open My Heart</button>
</div>

<script>
const audio=document.getElementById("bgMusic");
const msg=document.getElementById("message");

const timeline=[
"💭 I tried to find perfect words 💖",
"🥺 but nothing feels enough...",
"🌸 You changed my life completely",
"✨ Everything feels beautiful now",
"👑 ANU... YOU ARE MY WORLD 💖",
"😊 Your smile heals me",
"🫶 Your presence is peace",
"💞 I cherish you forever"
];

let shown=0;

function start(){
audio.play();
overlay.style.display="none";
}

audio.ontimeupdate=()=>{
let t=audio.currentTime;

if(t>1) mainPhoto.classList.add("show");

if(t>3 && shown<timeline.length){
let div=document.createElement("div");
div.classList.add("line");

let type=shown%3;
div.classList.add("float"+(type+1));

div.innerText=timeline[shown];
msg.appendChild(div);

setTimeout(()=>div.classList.add("show"),100);
shown++;
}

if(t>40){
document.getElementById("ending").classList.add("show");

/* 💥 heart burst */
for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="burst";
b.innerHTML="💖";
b.style.left=Math.random()*100+"%";
b.style.top=Math.random()*100+"%";
document.body.appendChild(b);
setTimeout(()=>b.remove(),1000);
}
}
};

/* 💖 background hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["💖","💕","💓","💞"][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*20)+"px";
h.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
},150);
</script>

</body>
</html>
