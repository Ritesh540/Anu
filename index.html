<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anu 💖</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
}

/* 🌸 Background glow */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(255,77,109,0.12), black 70%);
    animation:bgMove 15s linear infinite;
}
@keyframes bgMove{
    from{transform:translate(0,0);}
    to{transform:translate(-150px,-150px);}
}

/* 💖 TITLE FLOAT */
h1 {
    margin-top:40px;
    font-size:42px;
    position:relative;
    z-index:2;
    animation: softGlow 3s ease-in-out infinite alternate,
               floatSlow 8s ease-in-out infinite;
}

/* 🌸 PHOTO */
.hero-photo {
    margin-top:20px;
    position:relative;
    z-index:2;
}

.hero-photo::before {
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:url('photo1.jpg') center/cover no-repeat;
    filter:blur(25px) brightness(0.6);
    border-radius:50%;
    z-index:-1;
}

.hero-photo img {
    width:250px;
    height:250px;
    border-radius:50%;
    object-fit:cover;
    opacity:0;
    transform:scale(0.8);
    transition:2s ease;
}

.hero-photo img.show {
    opacity:1;
    transform:scale(1);
    animation: floatMedium 6s ease-in-out infinite,
               breathe 4s ease-in-out infinite;
}

/* 💎 TEXT */
#message {
    position:relative;
    z-index:2;
}

.line {
    opacity:0;
    margin:12px auto;
    width:80%;
    font-size:20px;
    transform:translateY(20px);
    transition: opacity 1.5s ease, transform 1.5s ease;
    will-change: transform;
}

.line.show {
    opacity:1;
    transform:translateY(0);
}

/* 🌸 FLOATING LAYERS */
.line.float1 { animation: floatSlow 8s ease-in-out infinite; }
.line.float2 { animation: floatMedium 10s ease-in-out infinite; }
.line.float3 { animation: floatDeep 12s ease-in-out infinite; }

@keyframes floatSlow {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

@keyframes floatMedium {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes floatDeep {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
}

/* 💓 PHOTO GLOW */
@keyframes breathe {
    0% {box-shadow:0 0 20px rgba(255,105,135,0.4);}
    50% {box-shadow:0 0 40px rgba(255,105,135,0.7);}
    100% {box-shadow:0 0 20px rgba(255,105,135,0.4);}
}

/* ✨ TEXT GLOW */
@keyframes softGlow {
    0% { text-shadow:0 0 8px #ff4d6d; }
    100% { text-shadow:0 0 20px #ff99aa; }
}

/* 💖 BACKGROUND HEARTS */
.heart {
    position:fixed;
    bottom:-20px;
    color:rgba(255,153,170,0.7);
    pointer-events:none;
    animation: floatHeart linear forwards;
    z-index:0;
}

@keyframes floatHeart {
    0% {
        transform: translateY(0) scale(0.8);
        opacity:0;
    }
    20% { opacity:0.6; }
    100% {
        transform: translateY(-110vh) scale(1.2);
        opacity:0;
    }
}

/* 💖 ENDING */
.ending {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    color:#ff99aa;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:28px;
    opacity:0;
    transition:3s;
    z-index:3;
}
.ending.show {opacity:1;}

/* 💫 OVERLAY */
#overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:5;
}

#startBtn {
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:pink;
}
</style>
</head>

<body>

<h1>HEY ANU ❤️</h1>

<div class="hero-photo">
    <img src="photo1.jpg" id="mainPhoto">
</div>

<div id="message"></div>

<div class="ending" id="ending">
    <div>💖</div>
    <div>Happy dear wife ❣️</div>
    <div>"Wishing a magical birthday to the woman who fills my life with love, light, and joy."</div>
    <div>❤️‍🩹🫀♾️</div>
</div>

<audio id="bgMusic">
    <source src="song.mp3" type="audio/mp3">
</audio>

<div id="overlay">
    💖 Open my princess, the surprise awaits 💖
    <button id="startBtn">Open My Heart 💖</button>
</div>

<script>
const audio = document.getElementById("bgMusic");
const overlay = document.getElementById("overlay");
const btn = document.getElementById("startBtn");
const container = document.getElementById("message");

const timeline = [
    { time: 3, text: "I’ve been trying to find the right words for you," },
    { time: 8, text: "but honestly… nothing ever feels enough..." },
    { time: 14, text: "From the day you came into my life," },
    { time: 20, text: "everything started feeling more meaningful." },
    { time: 26, text: "ANU... YOU ARE MY WORLD 💖", highlight: true },
    { time: 34, text: "Your smile fixes my worst days," },
    { time: 40, text: "and your presence brings me peace." },
    { time: 46, text: "I really cherish you more than words can explain." }
];

let shown = new Set();

function startExperience(){
    audio.play().then(()=>{
        overlay.style.display="none";
    });
}

btn.onclick = startExperience;
overlay.onclick = startExperience;

audio.ontimeupdate = ()=>{
    let current = audio.currentTime;

    if(current >= 1){
        document.getElementById("mainPhoto").classList.add("show");
    }

    timeline.forEach((line,index)=>{
        if(current>=line.time && !shown.has(index)){
            shown.add(index);

            const div=document.createElement("div");
            div.classList.add("line");

            const type = index % 3;
            if(type === 0) div.classList.add("float1");
            if(type === 1) div.classList.add("float2");
            if(type === 2) div.classList.add("float3");

            if(line.highlight) div.classList.add("highlight");

            div.innerText=line.text;
            container.appendChild(div);

            requestAnimationFrame(()=>{
                div.classList.add("show");
            });
        }
    });

    if(current>=55){
        document.getElementById("ending").classList.add("show");
    }
};

/* 💖 Floating hearts */
setInterval(()=>{
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (14 + Math.random()*10) + "px";
    heart.style.animationDuration = (6 + Math.random()*4) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),10000);
},600);
</script>

</body>
</html>
