<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anu 💖</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
}

/* Background glow */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(255,77,109,0.15), black 70%);
    animation:moveBg 10s linear infinite;
}
@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

/* Name */
h1{
    margin-top:40px;
    font-size:38px;
    text-shadow:0 0 15px pink;
}

/* Photo section */
.hero-photo{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:20px;
}

/* Blur background */
.hero-photo::before{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    background:url('photo1.jpg') center/cover no-repeat;
    filter:blur(25px) brightness(0.6);
    border-radius:50%;
    z-index:-1;
}

/* Rotating light */
.hero-photo::after{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    border-radius:50%;
    background:conic-gradient(from 0deg,#ff4d6d,transparent,#ff99aa,transparent,#ff4d6d);
    animation:rotateLight 6s linear infinite;
    filter:blur(20px);
    z-index:-2;
}
@keyframes rotateLight{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Main image */
.hero-photo img{
    width:260px;
    height:260px;
    border-radius:50%;
    object-fit:cover;
    opacity:0;
    transform:scale(0.5);
    transition:1.5s;
    box-shadow:0 0 30px pink,0 0 80px #ff4d6d;
}

/* Show */
.hero-photo img.show{
    opacity:1;
    transform:scale(1);
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* Heartbeat */
.hero-photo img.beat{
    animation:heartbeat 1.2s infinite;
}
@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.08);}
    50%{transform:scale(1);}
    75%{transform:scale(1.12);}
    100%{transform:scale(1);}
}

/* Text */
.line{
    opacity:0;
    margin:10px;
    font-size:20px;
    transition:1s;
}
.line.show{opacity:1;}
.highlight{color:#ff99aa;}

/* Ending */
.ending{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:black;
    opacity:0;
    transition:2s;
}
.ending.show{opacity:1;}
.big-heart{font-size:80px;}

/* Explosion */
.explosion{
    position:fixed;
    font-size:25px;
    animation:explode 1s forwards;
}
@keyframes explode{
    from{opacity:1; transform:scale(0);}
    to{opacity:0; transform:scale(5);}
}

/* Overlay */
#overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:pink;
    cursor:pointer;
}
</style>
</head>

<body>

<h1 id="nameReveal"></h1>

<div class="hero-photo">
    <img src="photo1.jpg" id="mainPhoto">
</div>

<div id="message"></div>

<div class="ending" id="ending">
    <div class="big-heart">💖</div>
    <div>Happy dear wife ❣️</div>
    <div>"Wishing a magical birthday to the woman who fills my life with love, light, and joy."</div>
    <div>❤️‍🩹🫀♾️</div>
</div>

<audio id="bgMusic">
    <source src="song.mp3" type="audio/mp3">
</audio>

<div id="overlay">
    💖 Open my princess, the surprise awaits 💖
    <button id="startBtn">Open My Heart 💖</button>
</div>

<script>
const audio=document.getElementById("bgMusic");
const overlay=document.getElementById("overlay");
const btn=document.getElementById("startBtn");
const container=document.getElementById("message");

/* Name reveal */
const name="HEY ANU ❤️";
let i=0;
function revealName(){
    if(i<name.length){
        document.getElementById("nameReveal").innerHTML+=name.charAt(i);
        i++;
        setTimeout(revealName,120);
    }
}

/* Typing */
function typeLine(text,div){
    let i=0;
    function t(){
        if(i<text.length){
            div.innerHTML+=text.charAt(i);
            i++;
            setTimeout(t,40);
        }
    }
    t();
}

/* Timeline */
const timeline=[
    {time:3,text:"I tried to write something perfect for you..."},
    {time:8,text:"but every word feels small in front of you..."},
    {time:14,text:"From the moment you came into my life..."},
    {time:19,text:"everything changed into something beautiful."},
    {time:25,text:"ANU... YOU ARE MY WORLD 💖",highlight:true},
    {time:28,text:"Anu, you are the most beautiful part of my life 💫"},
    {time:32,text:"Your smile is my peace..."},
    {time:38,text:"Your love is my strength..."},
    {time:45,text:"And you... are my forever ♾️"}
];

let shown=[];

/* Explosion */
function loveExplosion(){
    for(let i=0;i<20;i++){
        let el=document.createElement("div");
        el.innerHTML="💖";
        el.classList.add("explosion");
        el.style.left=Math.random()*100+"vw";
        el.style.top=Math.random()*100+"vh";
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),1000);
    }
}

/* Start */
function start(){
    audio.play().then(()=>{
        overlay.style.display="none";
        revealName();
    });
}
btn.onclick=start;
overlay.onclick=start;

/* Timeline */
audio.ontimeupdate=()=>{
    let current=audio.currentTime;

    if(current>=2){
        document.getElementById("mainPhoto").classList.add("show");
    }
    if(current>=4){
        document.getElementById("mainPhoto").classList.add("beat");
    }

    timeline.forEach((line,index)=>{
        if(current>=line.time && !shown.includes(index)){
            shown.push(index);
            let div=document.createElement("div");
            div.classList.add("line");
            if(line.highlight) div.classList.add("highlight");
            container.appendChild(div);
            typeLine(line.text,div);
            setTimeout(()=>div.classList.add("show"),100);
        }
    });

    if(current>=55){
        document.getElementById("ending").classList.add("show");
        loveExplosion();
    }
};
</script>

</body>
</html>
