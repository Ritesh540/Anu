<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anu 💖</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
}

/* Glow title */
h1 {
    margin-top:40px;
    font-size:42px;
    animation:glow 2s infinite alternate;
}
@keyframes glow {
    from {text-shadow:0 0 10px #ff4d6d;}
    to {text-shadow:0 0 25px #ff99aa;}
}

/* 🌸 HERO PHOTO */
.hero-photo {
    margin-top:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* glow background */
.hero-photo::before {
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:url('photo1.jpg') center/cover no-repeat;
    filter:blur(25px) brightness(0.6);
    border-radius:50%;
    z-index:-1;
}

/* main image */
.hero-photo img {
    width:250px;
    height:250px;
    border-radius:50%;
    object-fit:cover;
    opacity:0;
    transform:scale(0.6);
    transition:1.5s ease;
    box-shadow:0 0 20px pink,0 0 40px #ff4d6d;
}

/* show animation */
.hero-photo img.show {
    opacity:1;
    transform:scale(1);
    animation:floatUpDown 4s ease-in-out infinite;
}

/* floating */
@keyframes floatUpDown {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(-12px);}
}

/* 💓 heartbeat pulse */
@keyframes pulseBeat {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.12); }
    60%  { transform: scale(1); }
    100% { transform: scale(1); }
}

.hero-photo img.pulse {
    animation: pulseBeat 0.6s ease;
}

/* Text lines */
.line {
    opacity:0;
    margin:12px auto;
    width:80%;
    font-size:20px;
    transform:translateY(20px);
    transition:1s;
}
.line.show {
    opacity:1;
    transform:translateY(0) scale(1.05);
}
.highlight {
    color:#ff99aa;
    font-weight:bold;
    text-shadow:0 0 20px pink;
}

/* Floating hearts */
.heart {
    position:fixed;
    bottom:-10px;
    font-size:22px;
    animation:float 5s linear infinite;
}
@keyframes float {
    to {transform:translateY(-100vh); opacity:0;}
}

/* Sparkles */
.sparkle {
    position:fixed;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    pointer-events:none;
    animation:sparkleAnim 3s linear infinite;
}
@keyframes sparkleAnim {
    0% {transform:translateY(0) scale(0.5);}
    50% {transform:translateY(-200px) scale(1);}
    100% {transform:translateY(-400px) scale(0.3); opacity:0;}
}

/* Ending */
.ending {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    color:#ff99aa;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:28px;
    opacity:0;
    transition:2s;
}
.ending.show {opacity:1;}
.big-heart {
    font-size:90px;
    animation:boom 1s ease forwards;
}
@keyframes boom {
    0% {transform:scale(0);}
    100% {transform:scale(1.5);}
}

/* Overlay */
#overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:24px;
    z-index:1000;
    text-align:center;
    padding:20px;
}

#startBtn {
    margin-top:20px;
    padding:12px 25px;
    font-size:20px;
    border-radius:12px;
    border:none;
    background:pink;
    color:black;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>HEY ANU ❤️</h1>

<div class="hero-photo">
    <img src="photo1.jpg" id="mainPhoto">
</div>

<div id="message"></div>

<div class="ending" id="ending">
    <div class="big-heart">💖</div>
    <div>Happy dear wife ❣️</div>
    <div>"Wishing a magical birthday to the woman who fills my life with love, light, and joy."</div>
    <div>❤️‍🩹🫀♾️</div>
</div>

<audio id="bgMusic">
    <source src="song.mp3" type="audio/mp3">
</audio>

<div id="overlay">
    💖 Open my princess, the surprise awaits 💖
    <button id="startBtn">💖 Open My Heart 💖</button>
</div>

<script>
const audio = document.getElementById("bgMusic");
const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");
const container = document.getElementById("message");

let beatInterval;

function startHeartbeat(){
    const photo = document.getElementById("mainPhoto");

    beatInterval = setInterval(()=>{
        photo.classList.add("pulse");

        setTimeout(()=>{
            photo.classList.remove("pulse");
        },600);

    }, 900); // adjust based on song
}

const timeline = [
    { time: 3, text: "I’ve been trying to find the right words for you," },
    { time: 7, text: "but honestly… nothing ever feels enough..." },
    { time: 12, text: "From the day you came into my life," },
    { time: 16, text: "everything started feeling more meaningful." },
    { time: 22, text: "ANU... YOU ARE TRULY THE PRINCESS OF MY HEART 👑", highlight: true },
    { time: 28, text: "Your smile fixes my worst days," },
    { time: 32, text: "and your presence brings me peace." },
    { time: 38, text: "I really cherish you more than words can explain." },
    { time: 45, text: "Stay the same amazing person always 💫" }
];

let shown = [];

function startExperience() {
    audio.play().then(()=>{
        overlay.style.display = "none";

        // start heartbeat after music starts
        setTimeout(startHeartbeat, 2000);

    }).catch(()=>{
        alert("Tap again to start music 💖");
    });
}

startBtn.addEventListener("click", startExperience);
overlay.addEventListener("click", startExperience);

audio.ontimeupdate = ()=>{
    let current = audio.currentTime;

    if(current >= 1){
        document.getElementById("mainPhoto").classList.add("show");
    }

    timeline.forEach((line,index)=>{
        if(current>=line.time && !shown.includes(index)){
            shown.push(index);
            const div = document.createElement("div");
            div.classList.add("line");
            if(line.highlight) div.classList.add("highlight");
            div.innerText = line.text;
            container.appendChild(div);
            setTimeout(()=>div.classList.add("show"),100);
        }
    });

    if(current>=60){
        document.getElementById("ending").classList.add("show");
        clearInterval(beatInterval);
    }
};

// Hearts
setInterval(()=>{
    const heart=document.createElement("div");
    heart.innerHTML="💖";
    heart.classList.add("heart");
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
},300);

// Sparkles
setInterval(()=>{
    const sparkle=document.createElement("div");
    sparkle.classList.add("sparkle");
    sparkle.style.left=Math.random()*100+"vw";
    sparkle.style.top=Math.random()*100+"vh";
    document.body.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),3000);
},200);
</script>

</body>
</html>
